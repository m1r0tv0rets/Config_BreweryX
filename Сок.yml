#Напиток Ягодный сок#
  juice_base: #id заготовки заготовки, начало кода заготовки
    name: Ягодное сусло #Имя заготовки:Ягодное сусло
    ingredients: Sweet_berries
      - Sweet_berries
      - Glow_berries
      - Sugar #Ингредиенты: Сладкие ягоды, Светящиеся ягоды, Сахар
    cookParticles: ‘#FF0000’ #Красный цвет напитка в hex кодировке
     
  juice: #id напитка, начало кода напитка
    name: 'Обычный сок/Вкусный сок/Очень вкусный сок' #Названия видов Сока
    ingredients: #Сладкие ягоды 25 штук, свящиещься ягоды 6 штук, Сахар 6 штуки
      - Sweet_berries/25
      - Glow_berries/6
      - Sugar/11
    cookingtime: 6 #Готовка 6 минут
    distillruns: 4 #Дистиляция 4 минуты
    age: 13 #Выдержка 13 минут в бочке
    color: RED #Цвет напитка красный
    difficulty: 6 #Уровень сложности варки Сока
    alcohol: 5 #Уровень алкоголя 5
    lore: #Качество Сока
      - '+ &7Не очень сладкий.' #Плохое
      - '++ &7Довольно сладкий' #Нормальное
      - '+++ &7Отличный!' #Лучшее
    effects: #Эффекты Чая
      - REGENERATION/1/30-80 #Регенерация уровень 1,30,80
      - SATURATION/1/30-80 #Насыщенность уровень 1,30,80
      - RESISTANCE/1/30-80 #Сопротивление уровень 1,30,80
      - HEALTH_BOOST/1/30-80 #Прилив здоровья уровень 1,30,80
    customModelData: 7 #Кастом модель 7 (Большая бутылка квадратратной формы обвязанная веревкой)
