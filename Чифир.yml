#Напиток Чифир#
  chifir_base: #id заготовки заготовки, начало кода заготовки
    name: Заварка для Чифира #Имя заготовки:Заварка для Чифира
    ingredients: Azalea_leaves #Ингредиенты: Листва Азалии
    cookParticles: - ‘#000000’ #Черный цвет напитка в hex кодировке

  сhifir: #id напитка, начало кода напитка
    name: 'Чифир/Крепкий Чифир/Очень Крепкий Чифир' #Названия видов Чафира
    ingredients:
      - azalea_leaves/45 #Листва Азалии 45 штук
    cookingtime: 5 #Готовка 5 минут
    distillruns: #Дистиляция отсуствует
    age: 6 #Выдержка 6 минуты в бочке
    color: BLACK #Цвет напитка чёрный
    difficulty: 5 #Уровень сложности варки Чафира 5
    alcohol: 15 #Уровень алкоголя 15
    lore: #Качество Чифира
      - '+ &7Не крепко.' #Плохое
      - '++ &7Не так крепко.' #Нормальное
      - '+++ &7Очень крепко.' #Лучшее
    effects: #Эффекты Чифира
      - HASTE/1/30-80 # Спешка уровень 1,30,80
      - SPEED/1/30-80 #Скорость уровень 1,30,80
      - STRENGTH/1/30-80 #Сила уровень 1,30,80
      - HUNGER/1/30-80 #Голод уровень 1,30,80
      - NAUSEA/1/30-80 #Тошнота уровень 1,30,80
    customModelData: 6 #Кастом модель 6 (Тонкая бутылочка обвязанная нитью)
