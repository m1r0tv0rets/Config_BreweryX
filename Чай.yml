#Напиток Чай#
  tea_base: #id заготовки заготовки, начало кода заготовки
    name: Заварка для чая #Имя заготовки:Заварка для Чая
    ingredients: Azalea_leaves 
      - Sugar #Ингредиенты: Листва Азалии, Сахар
    cookParticles: - ‘#964b00’ #Коричневый цвет в hex кодировке
     
  tea: #id напитка, начало кода напитка
    name: 'Обычный чай/Вкусный чай/Очень вкусный чай' #Названия видов Чая
    ingredients: #Листва Азалии 10 штук, Сахар 6 штуки
      - Azalea_leaves/10
      - Sugar/6
    cookingtime: 3 #Готовка 3 минуты
    distillruns: 2 #Дистиляция 2 минуты
    age: 4 #Выдержка 4 минуты в бочке
    color: BROWN #Цвет напитка коричневый
    difficulty: 4 #Уровень сложности варки Чая 4
    alcohol: 5 #Уровень алкоголя 5
    lore: #Качество Чая
      - '+ &7Не вкусно.' #Плохое
      - '++ &7Довольно неплохо' #Нормальное
      - '+++ &7Отлично!' #Лучшее
    effects: #Эффекты Чая
      - REGENERATION/1/30-80 #Регенерация уровень 1,30,80
      - SATURATION/1/30-80 #Насыщенность уровень 1,30,80
      - NIGHT_VISION/1/30-80 #Ночное зрение уровень 1,30,80
      - LUCK/1/30-80 #Везение уровень 1,30,80
    customModelData: 9 #Кастом модель 9 (Большая бутылка с длинным горлышком по бокам ручки)
